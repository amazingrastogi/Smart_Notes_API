<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Notes</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h1>Smart Notes</h1>

    <!-- EMPTY STATE -->
    <div id="emptyState" class="empty">
        No notes yet... <span onclick="openModal()">Click to add one ➕</span>
    </div>

    <!-- NOTES LIST -->
    <ul id="notesList"></ul>
</div>

<!-- MODAL -->
<div id="overlay" class="overlay hidden">
    <div class="modal">
        <input id="modalTitle" placeholder="Title">

        <div id="modalContent" contenteditable="true" class="editor"></div>

        <div class="toolbar">
            <button id="boldBtn" onclick="formatText('bold')">B</button>
            <button id="italicBtn" onclick="formatText('italic')">I</button>
            <button id="underlineBtn" onclick="formatText('underline')">U</button>
        </div>

        <button class="save-btn" onclick="saveNote()">Save</button>
        <button class="floating-btn" onclick="openModal()">➕</button>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
